<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudan Medical Permanent Exam</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0b10;
  --card: #15172a;
  --card-hover: #1c1f38;
  --border: #252845;
  --text: #e8eaf6;
  --text-dim: #7b7fa3;
  --accent: #7c3aed;
  --accent2: #a78bfa;
  --accent-glow: rgba(124,58,237,0.25);
  --surgery: #f87171;
  --medicine: #a78bfa;
  --obgyn: #34d399;
  --pediatrics: #fbbf24;
  --gradient1: linear-gradient(135deg, #7c3aed 0%, #a78bfa 50%, #c4b5fd 100%);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Tajawal', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
.bg-effects {
  position: fixed; top:0;left:0;width:100%;height:100%;
  pointer-events: none; z-index: 0; overflow: hidden;
}
.bg-orb {
  position: absolute; border-radius: 50%;
  filter: blur(80px); opacity: 0.12;
  animation: float 20s ease-in-out infinite;
}
.bg-orb:nth-child(1) { width:500px;height:500px;background:#7c3aed;top:-10%;right:-5%; }
.bg-orb:nth-child(2) { width:400px;height:400px;background:#a78bfa;bottom:-10%;left:-5%;animation-delay:-7s; }
.bg-orb:nth-child(3) { width:300px;height:300px;background:#34d399;top:40%;left:30%;animation-delay:-14s; }
@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(30px, -30px) scale(1.05); }
  66% { transform: translate(-20px, 20px) scale(0.95); }
}
.bg-grid {
  position: fixed; top:0;left:0;width:100%;height:100%;
  background-image:
    linear-gradient(rgba(124,58,237,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,58,237,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none; z-index: 0;
}
.container {
  position: relative; z-index: 1;
  max-width: 800px; margin: 0 auto; padding: 20px;
}
.header {
  text-align: center;
  padding: 60px 20px 40px;
  animation: fadeDown 0.8s ease;
}
@keyframes fadeDown { from { opacity:0; transform:translateY(-30px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

.logo {
  width: 90px; height: 90px;
  background: var(--gradient1);
  border-radius: 28px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 28px; font-size: 42px;
  box-shadow: 0 12px 40px var(--accent-glow);
  position: relative;
}
.logo::after {
  content:''; position:absolute; inset:-3px;
  border-radius:30px; background:var(--gradient1);
  z-index:-1; opacity:0.4; filter:blur(12px);
}
.site-title {
  font-size: 2.4rem; font-weight: 900;
  margin-bottom: 12px;
  background: var(--gradient1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.stats-strip {
  display: flex; justify-content: center; gap: 24px;
  margin: 20px 0 48px;
  animation: fadeUp 0.8s ease 0.2s both;
}
.strip-item { text-align: center; }
.strip-num { font-size: 1.8rem; font-weight: 800; color: var(--accent2); }
.strip-label { font-size: 0.75rem; color: var(--text-dim); letter-spacing: 1px; }

.loading-msg {
  text-align: center; padding: 40px 20px;
  color: var(--text-dim); font-size: 1rem;
  animation: pulse 1.5s ease-in-out infinite;
}
.error-msg {
  text-align: center; padding: 30px 20px;
  color: var(--surgery); font-size: 0.95rem;
  background: rgba(248,113,113,0.08);
  border: 1px solid rgba(248,113,113,0.2);
  border-radius: 16px;
}

.dropdown-area {
  animation: fadeUp 0.8s ease 0.3s both;
  margin-bottom: 40px;
}
.custom-dropdown { position: relative; }

.dropdown-trigger {
  width: 100%;
  padding: 18px 24px;
  border-radius: 16px;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-family: 'Tajawal', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.3s;
  user-select: none;
}
.dropdown-trigger:hover { border-color: var(--accent); }
.dropdown-trigger.open {
  border-color: var(--accent);
  box-shadow: 0 4px 24px var(--accent-glow);
  border-radius: 16px 16px 0 0;
}
.dropdown-trigger .arrow {
  transition: transform 0.3s; font-size: 0.9rem; color: var(--text-dim);
}
.dropdown-trigger.open .arrow {
  transform: rotate(180deg); color: var(--accent2);
}

.dropdown-menu {
  position: absolute; top: 100%; right: 0; left: 0;
  background: var(--card);
  border: 1.5px solid var(--accent); border-top: none;
  border-radius: 0 0 16px 16px;
  overflow: hidden;
  max-height: 0; opacity: 0;
  transition: max-height 0.35s ease, opacity 0.25s ease;
  z-index: 100;
}
.dropdown-menu.open {
  max-height: 500px; opacity: 1;
  box-shadow: 0 12px 40px var(--accent-glow);
}

.dropdown-search {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
  z-index: 2; position: relative;
}
.dropdown-search input {
  width: 100%;
  padding: 10px 14px 10px 38px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-family: 'Tajawal', sans-serif;
  font-size: 0.9rem; font-weight: 500;
  outline: none; transition: border-color 0.3s;
}
.dropdown-search input::placeholder { color: var(--text-dim); }
.dropdown-search input:focus { border-color: var(--accent); }
.dropdown-search-icon {
  position: absolute; left: 28px; top: 50%;
  transform: translateY(-50%);
  font-size: 0.85rem; color: var(--text-dim); pointer-events: none;
}

.dropdown-items {
  max-height: 380px; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.dropdown-items::-webkit-scrollbar { width: 6px; }
.dropdown-items::-webkit-scrollbar-track { background: transparent; }
.dropdown-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.dropdown-item {
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; transition: all 0.2s;
  border-bottom: 1px solid rgba(37,40,69,0.5);
}
.dropdown-item:last-child { border-bottom: none; }
.dropdown-item:hover { background: var(--card-hover); }
.dropdown-item:hover .item-arrow { color: var(--accent2); transform: translateX(-3px); }

.item-right { display: flex; align-items: center; gap: 12px; }

.item-num {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 0.8rem; color: #fff; flex-shrink: 0;
}

.item-info { display: flex; flex-direction: column; gap: 1px; }
.item-title { font-size: 0.95rem; font-weight: 700; }
.item-meta { font-size: 0.75rem; color: var(--text-dim); }

.item-arrow { color: var(--text-dim); font-size: 0.85rem; transition: all 0.2s; }

.no-results-drop {
  padding: 24px; text-align: center;
  color: var(--text-dim); font-size: 0.9rem;
}

.footer {
  text-align: center; padding: 48px 20px;
  color: var(--text-dim); font-size: 1.05rem; font-weight: 500;
}

@media (max-width: 600px) {
  .header { padding: 40px 16px 24px; }
  .site-title { font-size: 1.7rem; }
  .stats-strip { gap: 16px; }
  .strip-num { font-size: 1.3rem; }
}
</style>
</head>
<body>

<div class="bg-effects">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>
<div class="bg-grid"></div>

<div class="container">
  <div class="header">
    <div class="logo">🩺</div>
    <h1 class="site-title">Sudan Medical Permanent Exam</h1>
  </div>

  <div class="stats-strip">
    <div class="strip-item">
      <div class="strip-num" id="totalExams">&mdash;</div>
      <div class="strip-label">امتحانات</div>
    </div>
    <div class="strip-item">
      <div class="strip-num" id="totalQuestions">&mdash;</div>
      <div class="strip-label">سؤال</div>
    </div>
  </div>

  <div class="dropdown-area" id="dropdownArea">
    <div class="loading-msg">جاري تحميل الامتحانات...</div>
  </div>

  <div class="footer">
    دعواتنا تسبق أمنياتنا لكم بنجاح يثلج الصدور 🌹
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyCsr6BkD9Egntq_1rCQfb2GMzCXu4mPU-k",
  authDomain: "sudan-medical-exam-ea177.firebaseapp.com",
  projectId: "sudan-medical-exam-ea177",
  storageBucket: "sudan-medical-exam-ea177.firebasestorage.app",
  messagingSenderId: "264853458575",
  appId: "1:264853458575:web:c55bd58cfcd089dded2afa"
});
var db = firebase.firestore();

var exams = [];
var isOpen = false;

async function loadExams() {
  try {
    var snapshot = await db.collection('questions').get();
    var examCounts = {};
    var grandTotal = 0;

    snapshot.forEach(function(doc) {
      var d = doc.data();
      var eid = d.exam_id || 'unknown';
      if (!examCounts[eid]) {
        examCounts[eid] = { total: 0, Surgery: 0, Medicine: 0, 'OB/GYN': 0, Pediatrics: 0 };
      }
      examCounts[eid].total++;
      if (d.section && examCounts[eid][d.section] !== undefined) {
        examCounts[eid][d.section]++;
      }
      grandTotal++;
    });

    var examIds = Object.keys(examCounts).sort();

    exams = [];
    exams.push({ id: 'all', name: '\u062c\u0645\u064a\u0639 \u0627\u0644\u0627\u0645\u062a\u062d\u0627\u0646\u0627\u062a', total: grandTotal, icon: '\uD83D\uDCDA' });

    for (var i = 0; i < examIds.length; i++) {
      var c = examCounts[examIds[i]];
      exams.push({ id: examIds[i], name: '\u0627\u0645\u062a\u062d\u0627\u0646 ' + (i + 1), total: c.total, num: i + 1 });
    }

    document.getElementById('totalExams').textContent = examIds.length;
    document.getElementById('totalQuestions').textContent = grandTotal;

    buildDropdown();
  } catch (e) {
    document.getElementById('dropdownArea').innerHTML =
      '<div class="error-msg">\u274c \u062e\u0637\u0623 \u0641\u064a \u062a\u062d\u0645\u064a\u0644 \u0627\u0644\u0627\u0645\u062a\u062d\u0627\u0646\u0627\u062a<br><small>' + e.message + '</small></div>';
  }
}

function buildDropdown() {
  document.getElementById('dropdownArea').innerHTML =
    '<div class="custom-dropdown" id="customDropdown">' +
      '<div class="dropdown-trigger" id="dropdownTrigger" onclick="toggleDropdown()">' +
        '<span id="triggerText">\u2014 \u0627\u062e\u062a\u0631 \u0627\u0644\u0627\u0645\u062a\u062d\u0627\u0646 \u2014</span>' +
        '<span class="arrow">\u25BC</span>' +
      '</div>' +
      '<div class="dropdown-menu" id="dropdownMenu">' +
        '<div class="dropdown-search">' +
          '<span class="dropdown-search-icon">\uD83D\uDD0D</span>' +
          '<input type="text" id="dropSearch" placeholder="\u0627\u0628\u062d\u062b..." oninput="filterDropdown()">' +
        '</div>' +
        '<div class="dropdown-items" id="dropdownItems"></div>' +
      '</div>' +
    '</div>';
  filterDropdown();
}

function toggleDropdown() {
  isOpen = !isOpen;
  document.getElementById('dropdownTrigger').classList.toggle('open', isOpen);
  document.getElementById('dropdownMenu').classList.toggle('open', isOpen);
  if (isOpen) {
    document.getElementById('dropSearch').value = '';
    filterDropdown();
    setTimeout(function() { document.getElementById('dropSearch').focus(); }, 100);
  }
}

function closeDropdown() {
  isOpen = false;
  var t = document.getElementById('dropdownTrigger');
  var m = document.getElementById('dropdownMenu');
  if (t) t.classList.remove('open');
  if (m) m.classList.remove('open');
}

function filterDropdown() {
  var query = document.getElementById('dropSearch').value.trim().toLowerCase();
  var container = document.getElementById('dropdownItems');
  var filtered = [];
  for (var i = 0; i < exams.length; i++) {
    if (!query || exams[i].name.indexOf(query) !== -1) filtered.push(exams[i]);
  }

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results-drop">\u0644\u0627 \u062a\u0648\u062c\u062f \u0646\u062a\u0627\u0626\u062c</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var e = filtered[i];
    var badge = e.icon ? e.icon : e.num;
    html += '<div class="dropdown-item" onclick="goToExam(\'' + e.id + '\')">' +
      '<div class="item-right">' +
        '<div class="item-num">' + badge + '</div>' +
        '<div class="item-info">' +
          '<div class="item-title">' + e.name + '</div>' +
          '<div class="item-meta">' + e.total + ' \u0633\u0624\u0627\u0644</div>' +
        '</div>' +
      '</div>' +
      '<span class="item-arrow">\u2190</span>' +
    '</div>';
  }
  container.innerHTML = html;
}

function goToExam(id) {
  window.location.href = 'exam.html?exam=' + id;
}

document.addEventListener('click', function(e) {
  var dd = document.getElementById('customDropdown');
  if (dd && !dd.contains(e.target)) closeDropdown();
});

loadExams();
</script>
</body>
</html>
